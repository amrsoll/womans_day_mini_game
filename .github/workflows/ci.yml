name: Building Wasm binary using Cargo

on:
  pull_request:
  push:
    branches:
      - main

env:
  PROJ: "womans-day-mini-game"
  # Target triple
  TARGET: wasm32-unknown-unknown
  # Either debug or release
  OPTIMISATION: release
  CARGO_TERM_COLOR: always

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: |
          rustup target add wasm32-unknown-unknown 
          cargo build --target ${TARGET} --${OPTIMISATION}
          tree -L 3 target
      - name: Integrate the wasm in the webpage
        run: |
          cargo install wasm-bindgen-cli
          $HOME/.cargo/bin/wasm-bindgen --target web --no-typescript --out-dir public/ --out-name "${PROJ}" target/wasm32-unknown-unknown/release/${PROJ}.wasm
          mv assets public/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4